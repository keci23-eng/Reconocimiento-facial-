{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Olvidé mi contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="login-bg">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <h3 class="mb-3">¿Olvidaste tu contraseña?</h3>
          <p>Ingresa tu correo y, si existe, recibirás un código de 6 dígitos.</p>

          <div id="alert" style="display:none"></div>

          <form id="forgotForm">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Correo</label>
              <input type="email" name="email" id="email" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100" id="sendBtn">Enviar código</button>
          </form>

          <div class="mt-3 text-center">
            <a href="/login/">Volver al inicio</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{% static 'js/password_reset.js' %}"></script>
</body>
</html>
